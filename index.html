        body {

            user-select: none;
            cursor: none;

        .film-grain {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.08;
            pointer-events: none;
            z-index: 100;
            mix-blend-mode: overlay;

            cursor: pointer;
            transition: all 0.5s ease;
        }
        #volume-control:hover {
            opacity: 1 !important;
            color: #C2A378;
        }

        .vignette-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.4) 100%);
            pointer-events: none;
            z-index: 90;
        }

        .star-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 10px;
            height: 10px;
            background: #ffffff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            mix-blend-mode: difference;
            will-change: left, top;
            transform: translate(-50%, -50%);
        }

        .card-letter {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .btn-cinematic {
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 3rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 9999px;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            font-size: 9px;
            transition: all 1s ease;
        }

        .btn-cinematic:hover {
            background: white;
            color: black;
        }

        .btn-cinematic:active {
            transform: scale(0.95);
        }

        .reveal-text {
            background: linear-gradient(to right, #ffffff 50%, rgba(255,255,255,0.1) 50%);
            background-size: 200% 100%;
            background-position: 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: reveal 2.5s ease-out forwards;
        }

        @keyframes reveal {
            from { background-position: 100%; }
            to { background-position: 0%; }
        }

        .particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.2;
            filter: blur(1px);
            animation: particle-drift 15s linear infinite;
        }

        @keyframes particle-drift {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            20% { opacity: 0.4; }
            80% { opacity: 0.4; }
            100% { transform: translateY(-100vh) translateX(20px); opacity: 0; }
        }

        .flame-animation {
            width: 2rem;
            height: 3.5rem;
            background: linear-gradient(to top, #ea580c, #facc15, #ffffff);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            animation: flame-flicker 0.6s infinite ease-in-out;
            box-shadow: 0 0 40px rgba(249, 115, 22, 0.8);
        }

        @keyframes flame-flicker {
            0%, 100% { transform: scale(1) rotate(-1deg); filter: blur(4px); }
            50% { transform: scale(0.9) rotate(2deg); filter: blur(6px); }
        }

        .photo-glow {
            box-shadow: 0 0 100px rgba(194, 163, 120, 0.15);
            transition: box-shadow 2s ease;
        }

        .photo-glow:hover {
            box-shadow: 0 0 150px rgba(194, 163, 120, 0.3);
        }

        #app-container {
            transition: opacity 1.5s ease;
        }

        .page-fade-in {
            animation: fadeIn 1.5s forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        .candle-glare {
            background: radial-gradient(circle, rgba(249,115,22,0.4) 0%, transparent 70%);
        }

        /* Marquee Animation */
        .marquee-container {
            overflow: hidden;
            user-select: none;
            display: flex;
            gap: 2.5rem;
            padding: 2.5rem 0;
            mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
        }

        .marquee-track {
            display: flex;
            gap: 2.5rem;
            animation: scroll 18s linear infinite;
            width: max-content;
        }

        .marquee-track:hover {
            animation-play-state: paused;
        }

        .marquee-track:hover {
            animation-play-state: paused;
        }

        @keyframes scroll {
            from { transform: translateX(0); }
            to { transform: translateX(-33.333%); }
        }

        .wish-card {
            width: 320px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 1.75rem;
            border-radius: 1.5rem;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: default;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 180px;
            position: relative;
            overflow: hidden;
        }

        .wish-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(194, 163, 120, 0.3), transparent);
        }

        .wish-card:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(194, 163, 120, 0.6);
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7), 0 0 20px rgba(194, 163, 120, 0.1);
        }

        .text-glow {
            color: #C2A378;
            text-shadow: 0 0 15px rgba(194, 163, 120, 0.5);
        }

        @keyframes ambientPulse {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.1); }
        }

        .ambient-glow {
            position: fixed;
            top: -20%; left: -10%;
            width: 80vw;
            height: 80vw;

            pointer-events: none;
            z-index: -1;
            animation: ambientPulse 15s ease-in-out infinite;
        }
    </style>

            {
                id: 5,
                type: "candle",
                title: "The Ritual",
                content: "sebelum kita tutup hari ini...",
                subContent: "nyalakan lilin ini, tarik napas dalam-dalam, dan titipkan satu doa untuk satu tahun ke depan."
            },
            {
                id: 6,
                type: "finale",
                title: "Selamat Ulang Tahun",
                content: "selamat beranjak dewasa, Lintang. makasih sudah berani melangkah sejauh ini.",
                subContent: "di antara jutaan bintang, buat kita… kamu tetap yang paling terang di server ini. 🎂🌟",
                isFinal: true
            }
        ];

        // FIREBASE SETUP REMOVED - NOW IN MODULE SCRIPT ABOVE

        // STATE
        let currentPage = -1;
        let trollCount = 0;
        let isCandleLit = false;
        let typewriter = null;
        let lastWishCount = -1;

        // ELEMENTS
        const startScreen = document.getElementById('page-start');
        const storyScreen = document.getElementById('page-story');
        const bgMusic = document.getElementById('bg-music');
        const musicIndicator = document.getElementById('music-indicator');
        const starCursor = document.getElementById('star-cursor');
        
        const storyTitleWrapper = document.getElementById('story-title-wrapper');
        const storyTitle = document.getElementById('story-title');
        const storyContent = document.getElementById('story-content');
        const storySubcontent = document.getElementById('story-subcontent');
        const storyPhotoContainer = document.getElementById('story-photo-container');
        const storyTextContainer = document.getElementById('story-text-container');
        
        const sectionTroll = document.getElementById('section-troll');
        const sectionChallenge = document.getElementById('section-challenge');
        const sectionCandle = document.getElementById('section-candle');
        const sectionFinale = document.getElementById('section-finale');
        const navNext = document.getElementById('nav-next');
        const btnNext = document.getElementById('btn-next');
        const trollBtnWrapper = document.getElementById('troll-btn-wrapper');
        const btnTroll = document.getElementById('btn-troll');

        // CURSOR TRACKING
        let mouseX = -20, mouseY = -20;
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        document.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
        }, { passive: true });

        function updateCursor() {
            starCursor.style.left = `${mouseX}px`;
            starCursor.style.top = `${mouseY}px`;
            requestAnimationFrame(updateCursor);
        }
        updateCursor();

        // VOLUME CONTROL
        const volumeControl = document.getElementById('volume-control');
        const volumeIcon = document.getElementById('volume-icon');
        let isMuted = false;

        volumeControl.addEventListener('click', () => {
            isMuted = !isMuted;
            bgMusic.muted = isMuted;
            volumeIcon.setAttribute('data-lucide', isMuted ? 'volume-x' : 'volume-2');
            volumeControl.style.opacity = isMuted ? '1' : '0.3';
            lucide.createIcons();
        });

        // INIT ICONS
        lucide.createIcons();

        // START APP
        document.getElementById('btn-start').addEventListener('click', () => {
            bgMusic.volume = 0.4;
            bgMusic.play();
            musicIndicator.style.opacity = '0.3';
            
            startScreen.classList.add('hidden');
            storyScreen.classList.remove('hidden');
            loadWishes(); // Load wishes early so user sees them immediately
            renderPage(0);
        });

        function renderPage(index) {
            currentPage = index;
            const page = STORY_PAGES[index];
            
            // Clean up
            sectionTroll.classList.add('hidden');
            sectionChallenge.classList.add('hidden');
            sectionCandle.classList.add('hidden');
            sectionFinale.classList.add('hidden');
            navNext.classList.add('hidden');
            storyPhotoContainer.classList.add('hidden');
            storyTextContainer.className = "space-y-10 md:col-span-12";
            
            // Show/Hide Marquee logic during story
            const marquee = document.getElementById('wishes-wall-container');
            if (page.type === "troll" || page.type === "candle") {
                marquee.classList.add('hidden');
            } else {
                marquee.classList.remove('hidden');
            }

            // Set Title
            if (page.title) {
                storyTitleWrapper.classList.remove('hidden');
                storyTitle.innerText = page.title;
            } else {
                storyTitleWrapper.classList.add('hidden');
            }

            // Typewriter effect
            storyContent.innerHTML = "";
            typewriter = new Typewriter(storyContent, {
                delay: 45,
                cursor: ""
            });
            typewriter.typeString(page.content).start();

            // Subcontent
            storySubcontent.innerText = page.subContent;
            storySubcontent.classList.remove('reveal-text');
            void storySubcontent.offsetWidth; // Trigger reflow
            storySubcontent.classList.add('reveal-text');

            // Handle Types
            if (page.type === "photo") {
                storyPhotoContainer.classList.remove('hidden');
                storyTextContainer.className = "space-y-10 md:col-span-7";
            } else if (page.type === "troll") {
                sectionTroll.classList.remove('hidden');
                trollCount = 0;
                btnTroll.style.transform = 'translate(0,0)';
            } else if (page.type === "challenge") {
                sectionChallenge.classList.remove('hidden');
                document.getElementById('challenge-task').innerText = page.challenge.task;
                document.getElementById('challenge-script').innerText = page.challenge.script;
            } else if (page.type === "candle") {
                sectionCandle.classList.remove('hidden');
            } else if (page.type === "finale") {
                sectionFinale.classList.remove('hidden');
                setTimeout(triggerConfetti, 1000);
            }

            // Show Nav
            if (!page.isFinal && page.type !== "troll" && page.type !== "candle") {
                setTimeout(() => {
                    navNext.classList.remove('hidden');
                    navNext.classList.add('page-fade-in');
                }, 4000);
            }
        }

        // NAVIGATION
        btnNext.addEventListener('click', () => {
            if (currentPage < STORY_PAGES.length - 1) {
                renderPage(currentPage + 1);
            }
        });

        // TROLL LOGIC
        function moveTrollButton() {
            if (trollCount < 6) {
                // Limit the offset so it doesn't go too far off screen
                const x = (Math.random() - 0.5) * 250;
                const y = (Math.random() - 0.5) * 200;
                btnTroll.style.transform = `translate(${x}px, ${y}px)`;
                trollCount++;
                
                if (trollCount === 6) {
                    btnTroll.innerText = "Yaudah, Klik di sini!";
                    btnTroll.style.transform = `translate(0, 0)`;
                }
            }
        }

        btnTroll.addEventListener('mouseenter', moveTrollButton);
        btnTroll.addEventListener('touchstart', (e) => {
            if (trollCount < 6) {
                e.preventDefault(); // Stop click from firing on move
                moveTrollButton();
            }
        }, { passive: false });

        btnTroll.addEventListener('click', () => {
            if (trollCount >= 6) {
                renderPage(currentPage + 1);
            } else {
                // If they somehow managed to click it before it moved
                moveTrollButton();
            }
        });

        // CANDLE LOGIC
        const candleTrigger = document.getElementById('candle-trigger');
        const flame = document.getElementById('flame');
        const wishForm = document.getElementById('wish-form');
        const candleWax = document.getElementById('candle-wax');

        candleTrigger.addEventListener('click', () => {
            if (!isCandleLit) {
                isCandleLit = true;
                flame.classList.remove('hidden');
                wishForm.classList.remove('hidden');
                wishForm.classList.add('page-fade-in');
                candleWax.style.height = '20%';
                document.getElementById('candle-hint').classList.add('hidden');
            }
        });

        // SUBMIT WISH
        const btnSubmitWish = document.getElementById('btn-submit-wish');
        btnSubmitWish.addEventListener('click', async () => {
            const nameEl = document.getElementById('input-name');
            const contentEl = document.getElementById('input-wish');
            const name = nameEl.value.trim();
            const content = contentEl.value.trim();
            
            if (name && content) {
                if (!window.firebase_db) {
                    alert("Koneksi ke Dinding Doa sedang disiapkan, tunggu sebentar ya...");
                    return;
                }

                btnSubmitWish.disabled = true;
                btnSubmitWish.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i><span>Mengirim Doa...</span>';
                lucide.createIcons();
                
                try {
                    const { db, collection, addDoc, serverTimestamp } = window.firebase_db;
                    
                    await addDoc(collection(db, 'wishes'), {
                        name: name,
                        content: content,
                        createdAt: serverTimestamp()
                    });
                    
                    showToast("Doa kamu telah terbit di langit-langit... ✨");
                    
                    // Clear inputs
                    nameEl.value = '';
                    contentEl.value = '';
                    
                    renderPage(currentPage + 1);
                } catch (e) {
                    console.error("Error saving wish:", e);
                    alert("Waduh, pengiriman gagal. Pastikan koneksimu lancar dan coba lagi ya.");
                    btnSubmitWish.disabled = false;
                    btnSubmitWish.innerHTML = 'Titipkan Doa <i data-lucide="send" class="w-3 h-3"></i>';
                    lucide.createIcons();
                }
            } else {
                alert("Lengkapi nama dan doamu dulu ya Lintang...");
            }
        });

        // LOAD WISHES
        function loadWishes() {
            if (!window.firebase_db) {
                setTimeout(loadWishes, 500);
                return;
            }
            
            const { db, collection, onSnapshot, query, orderBy, limit } = window.firebase_db;
            const wishesTrack = document.getElementById('wishes-track');
            const wishesWall = document.getElementById('wishes-wall-container');
            const wishCount = document.getElementById('wish-count');
            
            wishesWall.classList.remove('hidden');
            
            const q = query(collection(db, 'wishes'), orderBy('createdAt', 'desc'), limit(100));
            
            onSnapshot(q, snapshot => {
                const isInitial = lastWishCount === -1;
                const newWishIncoming = !isInitial && snapshot.size > lastWishCount;
                lastWishCount = snapshot.size;

                wishesTrack.innerHTML = '';
                wishCount.innerText = `${snapshot.size} DOA TERKUMPUL`;
                
                if (snapshot.empty) {
                    wishesTrack.innerHTML = '<p class="text-white/20 italic text-[10px] tracking-widest uppercase py-10 opacity-30 px-10">Belum ada doa yang tertulis...</p>';
                    return;
                }
                
                if (newWishIncoming && currentPage === 6) {
                    showToast("Seseorang baru saja menitipkan doa... ✨");
                }

                const docs = snapshot.docs;
                const loopDocs = [...docs, ...docs, ...docs];

                loopDocs.forEach((doc, idx) => {
                    const data = doc.data();
                    const date = data.createdAt ? data.createdAt.toDate().toLocaleDateString('id-ID', { day: 'numeric', month: 'long' }) : 'Baru saja';
                    
                    const wishCard = document.createElement('div');
                    wishCard.className = 'wish-card';
                    
                    const isNewest = (idx % docs.length === 0);

                    wishCard.innerHTML = `
                           <div class="space-y-4">
                               <div class="flex justify-between items-start">
                                  <i data-lucide="quote" class="w-4 h-4 text-[#C2A378] opacity-40"></i>
                                  ${isNewest ? '<span class="text-[7px] bg-[#C2A378] text-black px-2 py-0.5 rounded-full font-black animate-pulse tracking-tighter">LATEST MESSAGE</span>' : `<span class="text-[6px] text-white/20 tracking-tighter uppercase font-mono">#${(docs.length - (idx % docs.length))}</span>`}
                               </div>
                               <p class="text-[12px] font-light leading-relaxed italic text-white/90 line-clamp-4">"${data.content}"</p>
                           </div>
                           <div class="pt-4 border-t border-white/5 mt-4">
                              <div class="flex flex-col gap-0.5">
                                 <span class="text-[10px] font-black text-[#C2A378] uppercase tracking-[0.2em]">${data.name}</span>
                                 <span class="text-[7px] opacity-30 uppercase tracking-widest">${date}</span>
                              </div>
                           </div>
                    `;
                    wishesTrack.appendChild(wishCard);
                });
                lucide.createIcons();
            }, error => {
                console.error("Firestore error:", error);
                wishesTrack.innerHTML = `<p class="text-red-500/50 italic py-10 px-10 text-[10px]">Gagal memuat doa: ${error.message}</p>`;
            });
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'fixed top-10 right-10 z-[200] bg-white text-black px-6 py-3 rounded-full text-[10px] uppercase font-black tracking-widest shadow-2xl page-fade-in flex items-center gap-3';
            toast.innerHTML = `<i data-lucide="bell" class="w-3 h-3"></i> ${msg}`;
            document.body.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 1000);
            }, 3000);
        }

        // CONFETTI
        function triggerConfetti() {
            const end = Date.now() + 6 * 1000;
            const colors = ['#C2A378', '#A37C74', '#ffffff', '#EBE8E4'];

            (function frame() {
                confetti({
                    particleCount: 2,
                    angle: 60,
                    spread: 45,
                    origin: { x: 0, y: 0.8 },
                    colors: colors
                });
                confetti({
                    particleCount: 2,
                    angle: 120,
                    spread: 45,
                    origin: { x: 1, y: 0.8 },
                    colors: colors
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        document.getElementById('btn-celebrate').addEventListener('click', triggerConfetti);
        document.getElementById('btn-restart').addEventListener('click', () => {
             window.location.reload();
        });

        // PARTICLES
        const body = document.body;
        for(let i=0; i<15; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.top = Math.random() * 100 + '%';
            const size = Math.random() * 3 + 1 + 'px';
            p.style.width = size;
            p.style.height = size;
            p.style.animationDelay = Math.random() * 15 + 's';
            p.style.animationDuration = 10 + Math.random() * 10 + 's';
            body.appendChild(p);
        }
    </script>
</body>
</html>
